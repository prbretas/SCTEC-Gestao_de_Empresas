<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRM — SCTEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
    <style>
      .kanban-col { min-height: 400px; background: #f8f9fa; border-radius: 12px; padding: 12px; }
      .kanban-card { background: #fff; border-radius: 8px; padding: 12px; margin-bottom: 8px; border-left: 4px solid #dee2e6; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,.06); transition: box-shadow .15s; }
      .kanban-card:hover { box-shadow: 0 4px 12px rgba(0,0,0,.1); }
      .kanban-col-title { font-weight: 700; font-size: .85rem; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
      body.dark-mode .kanban-col { background: #1e1e1e; }
      body.dark-mode .kanban-card { background: #2c2c2c; color: #e0e0e0; border-left-color: #444; }
    </style>
    <script>
      (function () {
        try {
          var cfg = JSON.parse(localStorage.getItem("SCTEC_CONFIG") || "{}");
          var cores = cfg.cores || {};
          var r = document.documentElement;
          if (cores.header) r.style.setProperty("--sc-header", cores.header);
          if (cores.btn) r.style.setProperty("--sc-btn", cores.btn);
          if (cores.destaque) r.style.setProperty("--sc-header2", cores.destaque);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-light">

    <nav class="navbar navbar-dark shadow-sm mb-4">
      <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand h1 mb-0">🏭 SCTEC</span>
        <div class="d-flex gap-2">
          <a href="home.html" class="btn btn-outline-light btn-sm">🏠 Home</a>
        </div>
      </div>
    </nav>

    <main class="container-fluid pb-5 px-4">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 id="rotinaTitle">🎯 Funil de Vendas — CRM</h1>
        <button class="btn btn-success" id="btn-nova-oportunidade">+ Nova Oportunidade</button>
      </div>

      <!-- KANBAN BOARD -->
      <div class="row g-3">
        <div class="col-md-2">
          <div class="kanban-col">
            <div class="kanban-col-title text-muted">📥 Prospecção</div>
            <div id="col-prospeccao"></div>
          </div>
        </div>
        <div class="col-md-2">
          <div class="kanban-col">
            <div class="kanban-col-title" style="color:#0d6efd;">📬 Contato Feito</div>
            <div id="col-contato"></div>
          </div>
        </div>
        <div class="col-md-2">
          <div class="kanban-col">
            <div class="kanban-col-title" style="color:#6f42c1;">🤝 Proposta</div>
            <div id="col-proposta"></div>
          </div>
        </div>
        <div class="col-md-2">
          <div class="kanban-col">
            <div class="kanban-col-title" style="color:#fd7e14;">🔄 Negociação</div>
            <div id="col-negociacao"></div>
          </div>
        </div>
        <div class="col-md-2">
          <div class="kanban-col">
            <div class="kanban-col-title" style="color:#198754;">✅ Fechado</div>
            <div id="col-fechado"></div>
          </div>
        </div>
        <div class="col-md-2">
          <div class="kanban-col">
            <div class="kanban-col-title" style="color:#dc3545;">❌ Perdido</div>
            <div id="col-perdido"></div>
          </div>
        </div>
      </div>
    </main>

    <!-- MODAL: Nova/Editar Oportunidade -->
    <div class="modal fade" id="modal-oportunidade" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header text-white">
            <h5 class="modal-title" id="titulo-modal-oportunidade">🎯 Nova Oportunidade</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body p-4">
            <form id="form-oportunidade">
              <div class="mb-3">
                <label class="form-label fw-bold">Título *</label>
                <input type="text" id="op-titulo" class="form-control" required placeholder="Ex: Proposta de contrato anual" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Empresa *</label>
                <select id="op-empresa" class="form-select" required>
                  <option value="">Selecione...</option>
                </select>
              </div>
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label fw-bold">Valor (R$)</label>
                  <input type="number" id="op-valor" class="form-control" placeholder="0,00" min="0" step="0.01" />
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-bold">Previsão de Fechamento</label>
                  <input type="date" id="op-previsao" class="form-control" />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Etapa</label>
                <select id="op-etapa" class="form-select">
                  <option value="prospeccao">📥 Prospecção</option>
                  <option value="contato">📬 Contato Feito</option>
                  <option value="proposta">🤝 Proposta</option>
                  <option value="negociacao">🔄 Negociação</option>
                  <option value="fechado">✅ Fechado</option>
                  <option value="perdido">❌ Perdido</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Responsável</label>
                <input type="text" id="op-responsavel" class="form-control" placeholder="Nome do responsável" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Observações</label>
                <textarea id="op-observacoes" class="form-control" rows="3"></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" form="form-oportunidade" class="btn btn-success">Salvar</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/crm.js"></script>
    <script src="./js/inactivity.js"></script>
  </body>
</html>
