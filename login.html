<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — SCTEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
    <script>
      // Aplica cores salvas antes do render
      (function () {
        try {
          var cfg = JSON.parse(localStorage.getItem("SCTEC_CONFIG") || "{}");
          var cores = cfg.cores || {};
          var r = document.documentElement;
          if (cores.header) r.style.setProperty("--sc-header", cores.header);
          if (cores.btn) r.style.setProperty("--sc-btn", cores.btn);
          if (cores.destaque) r.style.setProperty("--sc-header2", cores.destaque);
        } catch (e) {}
      })();
    </script>
  </head>

  <body class="bg-light d-flex flex-column min-vh-100">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark shadow-sm mb-0">
      <div class="container">
        <span class="navbar-brand h1 mb-0" id="navbar-brand-login">🏭 SCTEC - Gestão Empresarial</span>
      </div>
    </nav>

    <!-- CONTEÚDO -->
    <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
      <div class="card shadow border-0" style="width: 100%; max-width: 420px;">
        <div class="card-body p-4">

          <h4 class="fw-bold mb-1 text-center">Bem-vindo</h4>
          <p class="text-muted text-center small mb-4">Faça login para continuar</p>

          <!-- FORMULÁRIO LOGIN -->
          <form id="form-login">
            <div class="mb-3">
              <label class="form-label fw-bold">Usuário</label>
              <input type="text" id="login-nome" class="form-control" placeholder="Seu nome de usuário" autocomplete="username" required />
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Senha</label>
              <div class="input-group">
                <input type="password" id="login-senha" class="form-control" placeholder="Sua senha" autocomplete="current-password" required />
                <button type="button" class="btn btn-outline-secondary" id="btn-toggle-senha" tabindex="-1" title="Mostrar/ocultar senha">👁</button>
              </div>
            </div>

            <div id="login-erro" class="alert alert-danger py-2 small d-none"></div>

            <button type="submit" class="btn btn-success w-100 fw-bold mt-2" id="btn-entrar">
              Entrar
            </button>
          </form>

          <hr class="my-3" />

          <div class="d-flex justify-content-between small">
            <a href="register.html" class="text-decoration-none">➕ Criar conta</a>
            <a href="#" class="text-decoration-none text-muted" id="link-esqueci">🔑 Esqueci a senha</a>
          </div>
        </div>
      </div>
    </main>

    <!-- MODAL: Esqueci a senha -->
    <div class="modal fade" id="modal-recuperar" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header text-white">
            <h5 class="modal-title">🔑 Recuperar Senha</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body p-4">

            <!-- Passo 1: informar usuário -->
            <div id="rec-passo1">
              <p class="small text-muted mb-3">Informe seu nome de usuário para encontrarmos sua conta.</p>
              <div class="mb-3">
                <label class="form-label fw-bold">Usuário</label>
                <input type="text" id="rec-nome" class="form-control" placeholder="Seu nome de usuário" />
              </div>
              <div id="rec-erro1" class="alert alert-danger py-2 small d-none"></div>
              <button class="btn btn-success w-100" id="btn-rec-buscar">Continuar</button>
            </div>

            <!-- Passo 2: responder pergunta -->
            <div id="rec-passo2" class="d-none">
              <p class="small text-muted mb-1">Responda a pergunta secreta:</p>
              <p class="fw-bold mb-3" id="rec-pergunta"></p>
              <div class="mb-3">
                <label class="form-label fw-bold">Resposta</label>
                <input type="text" id="rec-resposta" class="form-control" placeholder="Sua resposta" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Nova Senha</label>
                <input type="password" id="rec-nova-senha" class="form-control" placeholder="Mínimo 4 caracteres" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Confirmar Nova Senha</label>
                <input type="password" id="rec-confirmar-senha" class="form-control" placeholder="Repita a nova senha" />
              </div>
              <div id="rec-erro2" class="alert alert-danger py-2 small d-none"></div>
              <div id="rec-sucesso" class="alert alert-success py-2 small d-none"></div>
              <button class="btn btn-success w-100" id="btn-rec-redefinir">Redefinir Senha</button>
            </div>

          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        // Aplica config visual
        if (window.ConfigController) ConfigController.aplicar(ConfigController.obter());

        // Se já tem sessão ativa, vai direto para home
        if (AuthService.obterSessao()) {
          window.location.href = "home.html";
          return;
        }

        const modalEl = document.getElementById("modal-recuperar");
        const modalRecuperar = new bootstrap.Modal(modalEl);

        // ── Toggle visibilidade senha ──────────────────────────────────────
        document.getElementById("btn-toggle-senha").addEventListener("click", () => {
          const input = document.getElementById("login-senha");
          input.type = input.type === "password" ? "text" : "password";
        });

        // ── Submit do login ────────────────────────────────────────────────
        document.getElementById("form-login").addEventListener("submit", async (e) => {
          e.preventDefault();
          const nome = document.getElementById("login-nome").value;
          const senha = document.getElementById("login-senha").value;
          const erroEl = document.getElementById("login-erro");
          const btnEntrar = document.getElementById("btn-entrar");

          btnEntrar.disabled = true;
          btnEntrar.textContent = "Entrando...";
          erroEl.classList.add("d-none");

          const resultado = await AuthService.login(nome, senha);

          if (resultado.ok) {
            window.location.href = "home.html";
          } else {
            erroEl.textContent = resultado.erro;
            erroEl.classList.remove("d-none");
            btnEntrar.disabled = false;
            btnEntrar.textContent = "Entrar";
          }
        });

        // ── Esqueci a senha ────────────────────────────────────────────────
        document.getElementById("link-esqueci").addEventListener("click", (e) => {
          e.preventDefault();
          // Reset do modal
          document.getElementById("rec-passo1").classList.remove("d-none");
          document.getElementById("rec-passo2").classList.add("d-none");
          document.getElementById("rec-nome").value = "";
          document.getElementById("rec-erro1").classList.add("d-none");
          modalRecuperar.show();
        });

        // Passo 1: buscar usuário e pergunta
        document.getElementById("btn-rec-buscar").addEventListener("click", () => {
          const nome = document.getElementById("rec-nome").value.trim();
          const erroEl = document.getElementById("rec-erro1");
          const pergunta = AuthService.obterPerguntaSecreta(nome);

          if (!pergunta) {
            erroEl.textContent = "Usuário não encontrado.";
            erroEl.classList.remove("d-none");
            return;
          }

          erroEl.classList.add("d-none");
          document.getElementById("rec-pergunta").textContent = pergunta;
          document.getElementById("rec-passo1").classList.add("d-none");
          document.getElementById("rec-passo2").classList.remove("d-none");
        });

        // Passo 2: redefinir senha
        document.getElementById("btn-rec-redefinir").addEventListener("click", async () => {
          const nome = document.getElementById("rec-nome").value.trim();
          const resposta = document.getElementById("rec-resposta").value;
          const novaSenha = document.getElementById("rec-nova-senha").value;
          const confirmar = document.getElementById("rec-confirmar-senha").value;
          const erroEl = document.getElementById("rec-erro2");
          const sucessoEl = document.getElementById("rec-sucesso");

          erroEl.classList.add("d-none");
          sucessoEl.classList.add("d-none");

          if (novaSenha !== confirmar) {
            erroEl.textContent = "As senhas não coincidem.";
            erroEl.classList.remove("d-none");
            return;
          }

          const resultado = await AuthService.redefinirSenha(nome, resposta, novaSenha);

          if (resultado.ok) {
            sucessoEl.textContent = "✅ Senha redefinida com sucesso! Faça login.";
            sucessoEl.classList.remove("d-none");
            setTimeout(() => modalRecuperar.hide(), 2000);
          } else {
            erroEl.textContent = resultado.erro;
            erroEl.classList.remove("d-none");
          }
        });
      });
    </script>
  </body>
</html>
