<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      href="https://images.emojiterra.com/google/noto-emoji/unicode-16.0/color/svg/1f3ed.svg"
    />
    <title>SCTEC - Gestão de Empreendimentos SC</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow mb-4">
      <div class="container">
        <span class="navbar-brand h1 mb-0">🏭 SCTEC - Gestão Empresarial</span>
        <div class="d-flex align-items-center gap-3">
          <div class="form-check form-switch text-light">
            <input
              class="form-check-input"
              type="checkbox"
              id="dark-mode-switch"
              style="cursor: pointer"
            />
            <label class="form-check-label" for="dark-mode-switch"
              >🌙 Dark Mode</label
            >
          </div>
        </div>
      </div>
    </nav>

    <div class="container">
      <div class="row">
        <div class="col-12">
          <div class="card shadow-sm border-0 p-4">
            <div
              class="d-flex flex-wrap justify-content-between align-items-center mb-4 gap-3"
            >
              <div>
                <h4 class="text-primary mb-0">Cadastros de Empreendimentos</h4>
                <small class="text-muted"
                  >Gestão de dados via LocalStorage e Arquivos</small
                >
              </div>
              <div class="d-flex gap-2">
                <button
                  class="btn btn-outline-primary"
                  onclick="Utils.exportarCSV()"
                >
                  📥 Exportar CSV
                </button>
                <label
                  class="btn btn-outline-secondary mb-0"
                  style="cursor: pointer"
                >
                  📤 Importar CSV
                  <input
                    type="file"
                    id="importador-csv"
                    hidden
                    accept=".csv"
                    onchange="Utils.importarCSV(event)"
                  />
                </label>
                <button
                  class="btn btn-success shadow-sm px-4"
                  onclick="abrirModalCadastro()"
                >
                  + Novo Registro
                </button>
              </div>
            </div>

            <div class="row mb-4">
              <div class="col-md-6">
                <div class="input-group">
                  <select
                    class="form-select border-secondary select-filter"
                    id="tipo-busca"
                  >
                    <option value="todos">Todos</option>
                    <option value="id">Código da Empresa</option>
                    <option value="nome" selected>Nome da Empresa</option>
                    <option value="registro">Registro (CPF/CNPJ)</option>
                    <option value="localizacao">Localização</option>
                    <option value="segmento">Segmento</option>
                    <option value="status">Status</option>
                  </select>
                  <input
                    type="text"
                    id="busca-empresa"
                    class="form-control border-secondary"
                    placeholder="Digite para pesquisar..."
                  />
                </div>
              </div>
              <div class="col-md-6 text-end">
                <a
                  href="#"
                  class="text-decoration-none small"
                  onclick="Utils.baixarModeloCSV()"
                  >📝 Baixar Modelo de Planilha (.csv)</a
                >
              </div>
            </div>

            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light text-primary">
                  <tr>
                    <th>Cód.</th>
                    <th>Empreendimento</th>
                    <th>Registro (CPF/CNPJ)</th>
                    <th>Município</th>
                    <th>Endereço</th>
                    <th>Segmento</th>
                    <th>Status</th>
                    <th class="text-center">Ações</th>
                  </tr>
                </thead>
                <tbody id="lista-corpo"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="modalFormulario"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header bg-primary text-white">
            <h5 id="titulo-modal-form" class="modal-title">Cadastro</h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body p-4">
            <form id="form-empreendimento">
              <input type="hidden" id="emp-id" />

              <div class="row">
                <div class="col-md-12 mb-3">
                  <label for="nome" class="form-label"
                    >Nome do Empreendimento</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="nome"
                    placeholder="Insira o nome"
                    required
                  />
                </div>
              </div>

              <div class="row">
                <div class="col-md-6 mb-3">
                  <label for="segmento" class="form-label">Segmento</label>
                  <select class="form-select select-colorido" id="segmento">
                    <option value="Logística">Logística</option>
                    <option value="Transportes">Transportes</option>
                    <option value="Fornecedor">Fornecedor</option>
                    <option value="Tecnologia">Tecnologia</option>
                    <option value="Indústria">Indústria</option>
                    <option value="Comércio">Comércio</option>
                    <option value="Serviços">Serviços</option>
                  </select>
                </div>
                <div class="col-md-6 mb-3">
                  <label for="tipo-pessoa" class="form-label"
                    >Tipo de Pessoa</label
                  >
                  <select class="form-select select-tpEmp" id="tipo-pessoa">
                    <option value="PJ">Pessoa Jurídica (CNPJ)</option>
                    <option value="PF">Pessoa Física (CPF)</option>
                  </select>
                </div>
              </div>

              <div class="row">
                <div class="col-md-12 mb-3">
                  <label for="registro" id="label-registro" class="form-label"
                    >Registro</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="registro"
                    placeholder="Insira o número do Registro"
                    required
                  />
                </div>
              </div>

              <div
                class="row border p-2 m-1 bg-light rounded endereco-container"
              >
                <div class="col-md-4 mb-3">
                  <label for="cep" class="form-label">CEP</label>
                  <input
                    type="text"
                    class="form-control"
                    id="cep"
                    placeholder="00000-000"
                  />
                </div>
                <div class="col-md-8 mb-3">
                  <label for="endereco" class="form-label">Endereço</label>
                  <input
                    type="text"
                    class="form-control"
                    id="endereco"
                    placeholder="Rua, Avenida, Logradouro... "
                    required
                  />
                </div>
                <div class="col-md-12 mb-3">
                  <label for="municipio" class="form-label">Município</label>
                  <input
                    type="text"
                    class="form-control"
                    id="municipio"
                    placeholder="Insira o nome do Município"
                    required
                  />
                </div>
              </div>

              <div class="row mt-3">
                <div class="col-md-6 mb-3">
                  <label for="responsavel" class="form-label"
                    >Responsável</label
                  >
                  <input 
                  type="text" 
                  class="form-control" 
                  id="responsavel"
                  placeholder="Insira o nome do Responsável" />
                </div>
                <div class="col-md-6 mb-3">
                  <label for="contato" class="form-label"
                    >Contato de Responsável</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    id="contato"
                    placeholder="E-mail ou Telefone"
                  />
                </div>
              </div>

              <div class="mb-3">
                <label for="status" class="form-label">Status</label>
                <select class="form-select select-status" id="status">
                  <option value="Ativo">Ativo</option>
                  <option value="Inativo">Inativo</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="observacoes" class="form-label">Observações</label>
                <textarea
                  class="form-control"
                  id="observacoes"
                  rows="3"
                  placeholder="Insira outras informações importantes..."
                ></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer bg-light">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="submit"
              form="form-empreendimento"
              id="btn-salvar"
              class="btn btn-success px-4"
            >
              Salvar
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="modalVisualizar"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header bg-info text-dark">
            <h5 class="modal-title">📄 Detalhes</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body p-4" id="modal-conteudo"></div>
          <div class="modal-footer bg-light">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Fechar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/forms.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
