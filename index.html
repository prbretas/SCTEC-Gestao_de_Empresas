<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      href="https://images.emojiterra.com/google/noto-emoji/unicode-16.0/color/svg/1f3ed.svg"
    />
    <title>SCTEC - Gestão de Empreendimentos SC</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-primary mb-4 shadow">
      <div class="container">
        <span class="navbar-brand mb-0 h1"
          >🏭 SCTEC - Gestão de Empreendimentos SC</span
        >
      </div>
    </nav>

    <div class="container">
      <div class="row">
        <div class="col-12">
          <div class="card shadow-sm border-0 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
              <h4 class="text-primary mb-0">Cadastro de Empreendimentos</h4>
              <button
                class="btn btn-success shadow-sm px-4"
                onclick="abrirModalCadastro()"
              >
                + Novo Empreendimento
              </button>
            </div>

            <div class="row mb-4">
              <div class="col-md-8">
                <div class="input-group shadow-sm">
                  <select
                    id="tipo-busca"
                    class="form-select bg-light"
                    style="max-width: 140px"
                  >
                    <option value="todos">Todos</option>
                    <option value="nome">Empresa</option>
                    <option value="id">Código</option>
                    <option value="municipio">Município</option>
                    <option value="segmento">Segmento</option>
                  </select>
                  <input
                    type="text"
                    id="busca-empresa"
                    class="form-control"
                    placeholder="Pesquisar..."
                  />
                  <span class="input-group-text bg-white">🔍</span>
                </div>
              </div>
            </div>

            <div class="table-responsive">
              <table class="table table-hover align-middle">
                <thead class="table-light text-primary">
                  <tr>
                    <th>Cód.</th>
                    <th>Empreendimento / Doc</th>
                    <th>Localização</th>
                    <th>Segmento</th>
                    <th>Status</th>
                    <th class="text-center">Ações</th>
                  </tr>
                </thead>
                <tbody id="lista-corpo"></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="modalFormulario"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header bg-primary text-white">
            <h5 id="titulo-modal-form" class="modal-title">
              Cadastro de Empreendimento
            </h5>
            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body p-4">
            <form id="form-empreendimento">
              <input type="hidden" id="emp-id" />

              <div class="row mb-3">
                <div class="col-md-12">
                  <label class="form-label">Nome da Empresa</label>
                  <input
                    type="text"
                    id="nome"
                    class="form-control"
                    placeholder="Razão Social"
                    required
                  />
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-4">
                  <label class="form-label">Tipo</label>
                  <select id="tipo-pessoa" class="form-select">
                    <option value="CPF">CPF</option>
                    <option value="CNPJ">CNPJ</option>
                  </select>
                </div>
                <div class="col-md-8">
                  <label class="form-label">Documento</label>
                  <input
                    type="text"
                    id="documento"
                    class="form-control"
                    placeholder="000.000.000-00"
                    required
                  />
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label">Responsável</label>
                  <input
                    type="text"
                    id="responsavel"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label">E-mail de Contato</label>
                  <input
                    type="email"
                    id="contato"
                    class="form-control"
                    required
                  />
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-8">
                  <label class="form-label">Endereço Completo</label>
                  <input
                    type="text"
                    id="endereco"
                    class="form-control"
                    required
                  />
                </div>
                <div class="col-md-4">
                  <label class="form-label">Município (SC)</label>
                  <input
                    type="text"
                    id="municipio"
                    class="form-control"
                    required
                  />
                </div>
              </div>

              <div class="row mb-3">
                <div class="col-md-6">
                  <label class="form-label">Segmento</label>
                  <select id="segmento" class="form-select">
                    <option value="Tecnologia">Tecnologia</option>
                    <option value="Logística">Logística</option>
                    <option value="Indústria">Indústria</option>
                    <option value="Comércio">Comércio</option>
                    <option value="Transportes">Transportes</option>
                    <option value="Fornecedor">Fornecedor</option>
                    <option value="Cliente">Cliente</option>
                  </select>
                </div>
                <div class="col-md-6">
                  <label class="form-label">Status</label>
                  <select id="status" class="form-select">
                    <option value="Ativo">Ativo</option>
                    <option value="Inativo">Inativo</option>
                  </select>
                </div>
              </div>
            </form>
          </div>
          <div class="modal-footer bg-light">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancelar
            </button>
            <button
              type="submit"
              form="form-empreendimento"
              id="btn-salvar"
              class="btn btn-success px-4"
            >
              Salvar Registro
            </button>
          </div>
        </div>
      </div>
    </div>

    <div
      class="modal fade"
      id="modalVisualizar"
      tabindex="-1"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header bg-info text-dark">
            <h5 class="modal-title">📄 Detalhes do Empreendimento</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body p-4" id="modal-conteudo"></div>
          <div class="modal-footer bg-light">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Fechar
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
