<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      href="https://images.emojiterra.com/google/noto-emoji/unicode-16.0/color/svg/1f3ed.svg"
    />

    <title>SCTEC - Gestão de Empreendimentos SC</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
      <div class="container">
        <span class="navbar-brand h1 mb-0">🏭 SCTEC - Gestão Empresarial</span>

        <div class="form-check form-switch text-light">
          <input
            class="form-check-input"
            type="checkbox"
            id="dark-mode-switch"
          />
          <label class="form-check-label">Modo Escuro</label>
        </div>
      </div>
    </nav>

    <main class="container">
      <h1 id="rotinaTitle">Gestão de Cadastros</h1>

      <div class="card shadow-sm border-0 mb-4">
        <div class="card-body bg-white rounded p-3">
          <div class="row g-2 align-items-center">
            <div class="col-auto">
              <select
                id="tipo-busca"
                class="form-select border-2"
                style="width: 160px"
              >
                <option value="todos">Todos</option>
                <option value="nome">Nome/Razão</option>
                <option value="registro">CPF/CNPJ</option>
                <option value="municipio">Município</option>
                <option value="segmento">Segmento</option>
              </select>
            </div>

            <div class="col">
              <input
                type="text"
                id="busca-empresa"
                class="form-control border-2"
                name="inputPesquisa"
                placeholder="Pesquisar empreendimentos..."
              />
            </div>

            <div class="col-auto d-flex gap-2">
              <button
                onclick="Utils.exportarCSV()"
                class="btn btn-outline-secondary"
              >
                📤 Exportar
              </button>

              <label class="btn btn-outline-secondary mb-0">
                📥 Importar
                <input
                  type="file"
                  hidden
                  accept=".csv"
                  onchange="Utils.importarCSV(this.files[0])"
                />
              </label>

              <button
                class="btn btn-success fw-bold shadow-sm px-4"
                onclick="abrirModalCadastro()"
              >
                + Novo Registro
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="card bg-primary text-white border-0 shadow-sm">
            <div class="card-body card-contadores">
              <h6>Total de Registros</h6>
              <h2 id="qtd-total" class="mb-0">0</h2>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card bg-success text-white border-0 shadow-sm">
            <div class="card-body card-contadores">
              <h6>Empreendimentos Ativos</h6>
              <h2 id="qtd-ativos" class="mb-0">0</h2>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card bg-info text-white border-0 shadow-sm">
            <div class="card-body card-contadores">
              <h6>
                Resultados da Busca
                <i id="icon-filtro" class="bi bi-funnel text-white"></i>
              </h6>
              <h2 id="qtd-filtrados" class="mb-0">0</h2>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="table-responsive rounded">
          <table class="table table-hover table-zebra align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th onclick="UIController.ordenar('id')" style="cursor:pointer">ID ↕️</th>
                <th onclick="UIController.ordenar('nome')" style="cursor:pointer">Empresa ↕️</th>
                <th onclick="UIController.ordenar('responsavel')" style="cursor:pointer">Responsável ↕️</th>
                <th>Endereço</th>
                <th onclick="UIController.ordenar('municipio')" style="cursor:pointer">Município ↕️</th>
                <th onclick="UIController.ordenar('segmento')" style="cursor:pointer">Segmento ↕️</th>
                <th onclick="UIController.ordenar('status')" style="cursor:pointer">Status ↕️</th>
                <th class="text-center">Ações</th>
              </tr>
            </thead>

            <tbody id="lista-corpo"></tbody>
          </table>
        </div>
      </div>

      <footer id="footer-screen">
        <div class="mt-3 text-end">
          <button
            onclick="Utils.baixarModeloCSV()"
            class="btn btn-link btn-sm text-decoration-none btn-dwnld-csv"
          >
            📥 Baixar Modelo CSV
          </button>
        </div>
      </footer>
    </main>

    <!-- MODAL -->

    <div class="modal fade" id="modalFormulario" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header text-white">
            <h5 class="modal-title" id="titulo-modal-form">Empreendimento</h5>

            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body p-4">
            <form id="form-empreendimento">
              <input type="hidden" id="emp-id" name="id" />

              <div class="row g-3">
                <div class="col-md-8">
                  <label class="form-label fw-bold">Nome / Razão Social</label>
                  <input
                    type="text"
                    id="nome"
                    name="nome"
                    class="form-control"
                    required
                  />
                </div>

                <div class="col-md-4">
                  <label class="form-label fw-bold">Documento</label>

                  <div class="input-group">
                    <select
                      id="tipo-pessoa"
                      class="form-select"
                      style="max-width: 70px"
                    >
                      <option value="PJ">PJ</option>
                      <option value="PF">PF</option>
                    </select>

                    <input
                      type="text"
                      id="registro"
                      name="registro"
                      class="form-control"
                      required
                    />
                  </div>
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-bold">Responsável</label>
                  <input
                    type="text"
                    id="responsavel"
                    name="responsavel"
                    class="form-control"
                    required
                  />
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-bold">E-mail</label>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-control"
                    placeholder="exemplo@email.com"
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-bold">Telefone</label>
                  <input
                    type="text"
                    id="telefone"
                    name="telefone"
                    class="form-control"
                    placeholder="(00) 00000-0000"
                  />
                </div>

                <div class="col-md-3">
                  <label class="form-label fw-bold">CEP</label>
                  <input type="text" name="cep" id="cep" class="form-control" />
                </div>

                <div class="col-md-5">
                  <label class="form-label fw-bold">Endereço</label>
                  <input
                    type="text"
                    name="endereco"
                    id="endereco"
                    class="form-control"
                  />
                </div>

                <div class="col-md-4">
                  <label class="form-label fw-bold">Município</label>
                  <input
                    type="text"
                    name="municipio"
                    id="municipio"
                    class="form-control"
                  />
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-bold">Segmento</label>

                  <select
                    id="segmento"
                    name="segmento"
                    class="form-select"
                    required
                  >
                    <option>Tecnologia</option>
                    <option>Indústria</option>
                    <option>Logística</option>
                    <option>Comércio</option>
                    <option>Serviços</option>
                    <option>Transportes</option>
                    <option>Fornecedor</option>
                    <option>Cliente</option>
                  </select>
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-bold">Status</label>

                  <select id="status" name="status" class="form-select">
                    <option value="Ativo">🟢 Ativo</option>
                    <option value="Inativo">🔴 Inativo</option>
                  </select>
                </div>

                <div class="col-12">
                  <label class="form-label fw-bold">Observações</label>

                  <textarea
                    name="observacoes"
                    id="observacoes"
                    class="form-control"
                    rows="3"
                  ></textarea>
                </div>
              </div>
            </form>
          </div>

          <div class="modal-footer d-flex justify-content-between">
            <div id="auditoria-info" class="small"></div>

            <div>
              <button class="btn btn-secondary" data-bs-dismiss="modal">
                Fechar
              </button>

              <button
                type="submit"
                form="form-empreendimento"
                id="btn-salvar"
                class="btn btn-success px-4"
              >
                Salvar
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./js/utils.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/forms.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
