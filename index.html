<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — SCTEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./src/css/styles.css" />
  </head>

  <body class="bg-light d-flex flex-column min-vh-100">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark shadow-sm mb-0">
      <div class="container">
        <span class="navbar-brand h1 mb-0" id="navbar-brand-login">🏭 SCTEC - Gestão Empresarial</span>
      </div>
    </nav>

    <!-- CONTEÚDO -->
    <main class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
      <div class="card shadow border-0" style="width: 100%; max-width: 420px;">
        <div class="card-body p-4">

          <h4 class="fw-bold mb-1 text-center">Bem-vindo</h4>
          <p class="text-muted text-center small mb-4">Faça login para continuar</p>

          <form id="form-login">
            <div class="mb-3">
              <label class="form-label fw-bold">Usuário</label>
              <input type="text" id="login-nome" class="form-control" placeholder="Seu nome de usuário" autocomplete="username" required />
            </div>
            <div class="mb-3">
              <label class="form-label fw-bold">Senha</label>
              <div class="input-group">
                <input type="password" id="login-senha" class="form-control" placeholder="Sua senha" autocomplete="current-password" required />
                <button type="button" class="btn btn-outline-secondary" id="btn-toggle-senha" tabindex="-1" title="Mostrar/ocultar senha">👁</button>
              </div>
            </div>

            <div id="login-erro" class="alert alert-danger py-2 small d-none"></div>

            <button type="submit" class="btn btn-success w-100 fw-bold mt-2" id="btn-entrar">
              Entrar
            </button>
          </form>

          <hr class="my-3" />

          <div class="d-flex justify-content-between small">
            <a href="register.html" class="text-decoration-none">➕ Criar conta</a>
            <a href="#" class="text-decoration-none text-muted" id="link-esqueci">🔑 Esqueci a senha</a>
          </div>
        </div>
      </div>
    </main>

    <!-- MODAL: Esqueci a senha -->
    <div class="modal fade" id="modal-recuperar" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header text-white">
            <h5 class="modal-title">🔑 Recuperar Senha</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body p-4">

            <div id="rec-passo1">
              <p class="small text-muted mb-3">Informe seu nome de usuário para encontrarmos sua conta.</p>
              <div class="mb-3">
                <label class="form-label fw-bold">Usuário</label>
                <input type="text" id="rec-nome" class="form-control" placeholder="Seu nome de usuário" />
              </div>
              <div id="rec-erro1" class="alert alert-danger py-2 small d-none"></div>
              <button class="btn btn-success w-100" id="btn-rec-buscar">Continuar</button>
            </div>

            <div id="rec-passo2" class="d-none">
              <p class="small text-muted mb-1">Responda a pergunta secreta:</p>
              <p class="fw-bold mb-3" id="rec-pergunta"></p>
              <div class="mb-3">
                <label class="form-label fw-bold">Resposta</label>
                <input type="text" id="rec-resposta" class="form-control" placeholder="Sua resposta" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Nova Senha</label>
                <input type="password" id="rec-nova-senha" class="form-control" placeholder="Mínimo 4 caracteres" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Confirmar Nova Senha</label>
                <input type="password" id="rec-confirmar-senha" class="form-control" placeholder="Repita a nova senha" />
              </div>
              <div id="rec-erro2" class="alert alert-danger py-2 small d-none"></div>
              <div id="rec-sucesso" class="alert alert-success py-2 small d-none"></div>
              <button class="btn btn-success w-100" id="btn-rec-redefinir">Redefinir Senha</button>
            </div>

          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./src/js/core/config.js"></script>
    <script src="./src/js/core/auth.js"></script>
    <script src="./src/js/pages/login.js"></script>
  </body>
</html>
