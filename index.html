<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="icon"
      type="image/png"
      href="https://images.emojiterra.com/google/noto-emoji/unicode-16.0/color/svg/1f3ed.svg"
    />

    <title>SCTEC - Gestão de Empreendimentos SC</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css" />

    <!-- Script inline: aplica cores salvas ANTES do render para evitar flash -->
    <script>
      (function() {
        try {
          var cfg = JSON.parse(localStorage.getItem('SCTEC_CONFIG') || '{}');
          var cores = cfg.cores || {};
          var r = document.documentElement;
          if (cores.header) r.style.setProperty('--sc-header', cores.header);
          if (cores.btn) r.style.setProperty('--sc-btn', cores.btn);
          if (cores.destaque) r.style.setProperty('--sc-header2', cores.destaque);
        } catch(e) {}
      })();
    </script>
  </head>

  <body class="bg-light">
    <!--MENU NAVBAR-->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm mb-4">
      <div class="container">
        <span class="navbar-brand h1 mb-0">🏭 SCTEC - Gestão Empresarial</span>

        <div class="d-flex align-items-center gap-3">
          <a href="dashboard.html" class="btn btn-outline-light btn-sm" title="Dashboard Analítico">📊</a>
          <a href="settings.html" class="btn btn-outline-light btn-sm" title="Configurações do sistema">⚙️</a>
          <div class="form-check form-switch text-light mb-0">
            <input
              class="form-check-input"
              type="checkbox"
              id="dark-mode-switch"
            />
            <label class="form-check-label">Modo Escuro</label>
          </div>
        </div>
      </div>
    </nav>

    <main class="container">
      <h1 id="rotinaTitle">Gestão de Cadastros</h1>

      <div class="card shadow-sm border-0 mb-4">
        <div class="card-body bg-white rounded p-3">
          <div class="row g-2 align-items-center">
            <div class="col-auto">
              <select
                id="tipo-busca"
                class="form-select border-2"
                style="width: 160px"
              >
                <option value="todos">Todos</option>
                <option value="nome">Nome/Razão</option>
                <option value="registro">CPF/CNPJ</option>
                <option value="municipio">Município</option>
                <option value="segmento">Segmento</option>
              </select>
            </div>

            <div class="col">
              <input
                type="text"
                id="busca-empresa"
                class="form-control border-2"
                name="inputPesquisa"
                placeholder="Pesquisar empreendimentos..."
              />
            </div>

            <div class="col-auto d-flex gap-2">
              <button
                onclick="Utils.exportarCSV()"
                class="btn btn-outline-secondary"
              >
                📤 Exportar
              </button>

              <label class="btn btn-outline-secondary mb-0">
                📥 Importar
                <input
                  type="file"
                  hidden
                  accept=".csv"
                  onchange="Utils.importarCSV(this.files[0])"
                />
              </label>

              <button
                onclick="Utils.backupJSON()"
                class="btn btn-outline-secondary"
                title="Fazer backup completo dos dados em JSON"
              >
                💾 Backup
              </button>

              <label class="btn btn-outline-secondary mb-0" title="Restaurar backup JSON">
                📦 Restore
                <input
                  type="file"
                  hidden
                  accept=".json"
                  onchange="Utils.restaurarJSON(this.files[0])"
                />
              </label>

              <button
                id="btn-exportar-excel"
                class="btn btn-outline-secondary"
                title="Exportar para Excel (.xlsx)"
              >
                📊 Excel
              </button>

              <button
                class="btn btn-success fw-bold shadow-sm px-4"
                onclick="abrirModalCadastro()"
              >
                + Novo Registro
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="card bg-primary text-white border-0 shadow-sm">
            <div class="card-body card-contadores">
              <h6>Total de Registros</h6>
              <h2 id="qtd-total" class="mb-0">0</h2>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card bg-success text-white border-0 shadow-sm">
            <div class="card-body card-contadores">
              <h6>Empreendimentos Ativos</h6>
              <h2 id="qtd-ativos" class="mb-0">0</h2>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card bg-info text-white border-0 shadow-sm">
            <div class="card-body card-contadores">
              <h6>
                Resultados da Busca
                <i id="icon-filtro" class="bi bi-funnel text-white"></i>
              </h6>
              <h2 id="qtd-filtrados" class="mb-0">0</h2>
            </div>
          </div>
        </div>
      </div>

      <div class="card shadow-sm border-0">
        <div class="table-responsive rounded">
          <table class="table table-hover table-zebra align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th
                  onclick="UIController.ordenar('id')"
                  data-coluna="id"
                  style="cursor: pointer; width: 75px"
                >
                  <div class="header-content">
                    ID <span class="sort-icon"></span>
                  </div>
                </th>

                <th
                  onclick="UIController.ordenar('nome')"
                  data-coluna="nome"
                  style="cursor: pointer; min-width: 320px"
                >
                  <div class="header-content">
                    EMPRESA <span class="sort-icon"></span>
                  </div>
                </th>

                <th
                  onclick="UIController.ordenar('responsavel')"
                  data-coluna="responsavel"
                  style="cursor: pointer; width: 180px"
                >
                  <div class="header-content">
                    RESPONSÁVEL <span class="sort-icon"></span>
                  </div>
                </th>

                <th style="min-width: 220px">ENDEREÇO</th>

                <th
                  onclick="UIController.ordenar('estado')"
                  data-coluna="estado"
                  style="cursor: pointer; width: 70px"
                >
                  <div class="header-content">
                    ESTADO <span class="sort-icon"></span>
                  </div>
                </th>

                <th
                  onclick="UIController.ordenar('municipio')"
                  data-coluna="municipio"
                  style="cursor: pointer; width: 100px"
                >
                  <div class="header-content">
                    MUNICÍPIO <span class="sort-icon"></span>
                  </div>
                </th>

                <th
                  onclick="UIController.ordenar('segmento')"
                  data-coluna="segmento"
                  style="cursor: pointer; width: 80px"
                >
                  <div class="header-content">
                    SEGMENTO <span class="sort-icon"></span>
                  </div>
                </th>

                <th
                  onclick="UIController.ordenar('status')"
                  data-coluna="status"
                  style="cursor: pointer; width: 80px"
                >
                  <div class="header-content">
                    STATUS <span class="sort-icon"></span>
                  </div>
                </th>

                <th class="acoes" style="width: 200px">AÇÕES</th>
              </tr>
            </thead>

            <tbody id="lista-corpo"></tbody>
          </table>
        </div>
      </div>

      <footer id="footer-screen">
        <div class="mt-3 d-flex justify-content-between align-items-center flex-wrap gap-2">

          <!-- Controles de Paginação -->
          <div id="paginacao" class="d-flex align-items-center gap-2" style="display:none!important;">
            <span id="paginacao-info" class="small text-muted"></span>
            <div class="d-flex align-items-center gap-1">
              <select id="itens-por-pagina" class="form-select form-select-sm" style="width:70px;" title="Itens por página"></select>
              <button id="btn-anterior" class="btn btn-outline-secondary btn-sm">← Ant</button>
              <span id="pagina-atual-info" class="small text-muted px-1"></span>
              <button id="btn-proxima" class="btn btn-outline-secondary btn-sm">Próx →</button>
            </div>
          </div>

          <div class="text-end">
            <button
              onclick="Utils.baixarModeloCSV()"
              class="btn btn-link btn-sm text-decoration-none btn-dwnld-csv"
            >
              📥 Baixar Modelo CSV
            </button>
          </div>
        </div>
      </footer>
    </main>

    <!-- MODAL -->

    <div class="modal fade" id="modalFormulario" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header text-white">
            <h5 class="modal-title" id="titulo-modal-form">Empreendimento</h5>

            <button
              type="button"
              class="btn-close btn-close-white"
              data-bs-dismiss="modal"
            ></button>
          </div>

          <div class="modal-body p-4">
            <!-- Abas do Modal -->
            <ul class="nav nav-tabs mb-3" id="modalTabs" role="tablist">
              <li class="nav-item" role="presentation">
                <button class="nav-link active" id="tab-dados" data-bs-toggle="tab" data-bs-target="#panel-dados" type="button" role="tab" aria-controls="panel-dados" aria-selected="true">📋 Dados</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-contatos" data-bs-toggle="tab" data-bs-target="#panel-contatos" type="button" role="tab" aria-controls="panel-contatos" aria-selected="false">📞 Contatos</button>
              </li>
              <li class="nav-item" role="presentation">
                <button class="nav-link" id="tab-tarefas" data-bs-toggle="tab" data-bs-target="#panel-tarefas" type="button" role="tab" aria-controls="panel-tarefas" aria-selected="false">✓ Tarefas</button>
              </li>
            </ul>

            <!-- Conteúdo das Abas -->
            <div class="tab-content" id="modalTabsContent">
              <!-- ABA 1: DADOS -->
              <div class="tab-pane fade show active" id="panel-dados" role="tabpanel" aria-labelledby="tab-dados">
            <form id="form-empreendimento">
              <input type="hidden" id="emp-id" name="id" />

              <div class="row g-3">
                <div class="col-md-8">
                  <label class="form-label fw-bold">Nome / Razão Social</label>
                  <input
                    type="text"
                    id="nome"
                    name="nome"
                    class="form-control"
                    required
                  />
                </div>

                <div class="col-md-4">
                  <label class="form-label fw-bold">Documento</label>

                  <div class="input-group">
                    <select
                      id="tipo-pessoa"
                      name="tipoPessoa"
                      class="form-select"
                      style="max-width: 70px"
                    >
                      <option value="PJ">PJ</option>
                      <option value="PF">PF</option>
                    </select>

                    <input
                      type="text"
                      id="registro"
                      name="registro"
                      class="form-control"
                      required
                    />
                  </div>
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-bold">Responsável</label>
                  <input
                    type="text"
                    id="responsavel"
                    name="responsavel"
                    class="form-control"
                    required
                  />
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-bold">E-mail</label>
                  <input
                    type="email"
                    id="email"
                    name="email"
                    class="form-control"
                    placeholder="exemplo@email.com"
                  />
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-bold">Telefone</label>
                  <input
                    type="text"
                    id="telefone"
                    name="telefone"
                    class="form-control"
                    placeholder="(00) 00000-0000"
                  />
                </div>

                <div class="col-md-3">
                  <label class="form-label fw-bold">CEP</label>
                  <input type="text" name="cep" id="cep" class="form-control" />
                </div>

                <div class="col-md-5">
                  <label class="form-label fw-bold">Endereço</label>
                  <input
                    type="text"
                    name="endereco"
                    id="endereco"
                    class="form-control"
                  />
                </div>

                <div class="col-md-3">
                  <label class="form-label fw-bold">Estado (UF)</label>
                  <select name="estado" id="estado" class="form-select">
                    <option value="">Selecione</option>
                    <option value="AC">Acre</option>
                    <option value="AL">Alagoas</option>
                    <option value="AP">Amapá</option>
                    <option value="AM">Amazonas</option>
                    <option value="BA">Bahia</option>
                    <option value="CE">Ceará</option>
                    <option value="DF">Distrito Federal</option>
                    <option value="ES">Espírito Santo</option>
                    <option value="GO">Goiás</option>
                    <option value="MA">Maranhão</option>
                    <option value="MT">Mato Grosso</option>
                    <option value="MS">Mato Grosso do Sul</option>
                    <option value="MG">Minas Gerais</option>
                    <option value="PA">Pará</option>
                    <option value="PB">Paraíba</option>
                    <option value="PR">Paraná</option>
                    <option value="PE">Pernambuco</option>
                    <option value="PI">Piauí</option>
                    <option value="RJ">Rio de Janeiro</option>
                    <option value="RN">Rio Grande do Norte</option>
                    <option value="RS">Rio Grande do Sul</option>
                    <option value="RO">Rondônia</option>
                    <option value="RR">Roraima</option>
                    <option value="SC">Santa Catarina</option>
                    <option value="SP">São Paulo</option>
                    <option value="SE">Sergipe</option>
                    <option value="TO">Tocantins</option>
                  </select>
                </div>

                <div class="col-md-4">
                  <label class="form-label fw-bold">Município</label>
                  <input
                    type="text"
                    name="municipio"
                    id="municipio"
                    class="form-control"
                  />
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-bold">Segmento</label>

                  <select
                    id="segmento"
                    name="segmento"
                    class="form-select"
                    required
                  >
                    <option>Tecnologia</option>
                    <option>Indústria</option>
                    <option>Logística</option>
                    <option>Comércio</option>
                    <option>Serviços</option>
                    <option>Transportes</option>
                    <option>Fornecedor</option>
                    <option>Cliente</option>
                  </select>
                </div>

                <div class="col-md-6">
                  <label class="form-label fw-bold">Status</label>

                  <select id="status" name="status" class="form-select">
                    <option value="Ativo">🟢 Ativo</option>
                    <option value="Inativo">🔴 Inativo</option>
                  </select>
                </div>

                <div class="col-12">
                  <label class="form-label fw-bold">Observações</label>

                  <textarea
                    name="observacoes"
                    id="observacoes"
                    class="form-control"
                    rows="3"
                  ></textarea>
                </div>

                <!-- SEÇÃO DE SÓCIOS — visível apenas quando CNPJ retorna QSA -->
                <div class="col-12" id="socios-section" style="display:none;">
                  <div class="socios-header d-flex align-items-center gap-2 mb-2">
                    <span class="socios-icon">👥</span>
                    <label class="form-label fw-bold mb-0">Quadro de Sócios e Administradores (QSA)</label>
                    <span id="socios-badge" class="badge bg-secondary ms-1">0</span>
                  </div>
                  <div id="socios-lista" class="socios-lista"></div>
                </div>

              </div>
            </form>
              </div>

              <!-- ABA 2: CONTATOS -->
              <div class="tab-pane fade" id="panel-contatos" role="tabpanel" aria-labelledby="tab-contatos">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <h6 class="mb-0">Contatos Vinculados</h6>
                  <button type="button" id="btn-adicionar-contato" class="btn btn-sm btn-success">➕ Adicionar</button>
                </div>
                <div id="contatos-lista" class="contatos-container"></div>
              </div>

              <!-- ABA 3: TAREFAS -->
              <div class="tab-pane fade" id="panel-tarefas" role="tabpanel" aria-labelledby="tab-tarefas">
                <div class="d-flex justify-content-between align-items-center mb-3">
                  <h6 class="mb-0">Tarefas e Follow-up</h6>
                  <button type="button" id="btn-adicionar-tarefa" class="btn btn-sm btn-success">➕ Adicionar</button>
                </div>
                <div id="tarefas-lista" class="tarefas-container"></div>
              </div>
            </div>
          </div>

          <div class="modal-footer d-flex justify-content-between">
            <div id="auditoria-info" class="small"></div>

            <div>
              <button class="btn btn-secondary" data-bs-dismiss="modal">
                Fechar
              </button>

              <button
                type="submit"
                form="form-empreendimento"
                id="btn-salvar"
                class="btn btn-success px-4"
              >
                Salvar
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL: Adicionar/Editar Contato -->
    <div class="modal fade" id="modal-contato" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header text-white">
            <h5 class="modal-title" id="titulo-modal-contato">➕ Novo Contato</h5>
            <button type="button" class="btn-close btn-close-white" id="btn-fechar-modal-contato" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body p-4">
            <form id="form-contato">
              <div class="mb-3">
                <label class="form-label fw-bold">Nome Completo *</label>
                <input type="text" id="contato-nome" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Cargo / Departamento</label>
                <input type="text" id="contato-cargo" class="form-control" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Telefone</label>
                <input type="text" id="contato-telefone" class="form-control" placeholder="(00) 00000-0000" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">E-mail</label>
                <input type="email" id="contato-email" class="form-control" placeholder="email@example.com" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">WhatsApp</label>
                <input type="text" id="contato-whatsapp" class="form-control" placeholder="(00) 00000-0000" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Observação</label>
                <textarea id="contato-observacao" class="form-control" rows="2"></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" form="form-contato" class="btn btn-success">Salvar Contato</button>
          </div>
        </div>
      </div>
    </div>

    <!-- MODAL: Adicionar/Editar Tarefa -->
    <div class="modal fade" id="modal-tarefa" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header text-white">
            <h5 class="modal-title" id="titulo-modal-tarefa">➕ Nova Tarefa</h5>
            <button type="button" class="btn-close btn-close-white" id="btn-fechar-modal-tarefa" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body p-4">
            <form id="form-tarefa">
              <div class="mb-3">
                <label class="form-label fw-bold">Título *</label>
                <input type="text" id="tarefa-titulo" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Descrição</label>
                <textarea id="tarefa-descricao" class="form-control" rows="2"></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Data de Vencimento *</label>
                <input type="date" id="tarefa-vencimento" class="form-control" required />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Prioridade *</label>
                <select id="tarefa-prioridade" class="form-select" required>
                  <option value="Baixa">🟢 Baixa</option>
                  <option value="Media" selected>🟡 Média</option>
                  <option value="Alta">🔴 Alta</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Responsável</label>
                <input type="text" id="tarefa-responsavel" class="form-control" />
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Status *</label>
                <select id="tarefa-status" class="form-select" required>
                  <option value="A fazer" selected>📝 A fazer</option>
                  <option value="Em andamento">⏳ Em andamento</option>
                  <option value="Concluida">✅ Concluída</option>
                </select>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" form="form-tarefa" class="btn btn-success">Salvar Tarefa</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Scripts — carregados no final do body para garantir que o DOM exista -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>

    <script src="./js/config.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/api.js"></script>
    <script src="./js/ui.js"></script>
    <script src="./js/forms.js"></script>
    <script src="./js/contatos.js"></script>
    <script src="./js/tarefas.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
