<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link
      rel="icon"
      type="image/png"
      href="https://images.emojiterra.com/google/noto-emoji/unicode-16.0/color/svg/1f3ed.svg"
    />
    <title>SCTEC - Gestão Empresarial</title>
    <!--LINK BOOTSTRAP-->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!--LINK STYLES CSS-->
    <link rel="stylesheet" href="css/styles.css" />
  </head>
<body>
    <div class="container mt-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card shadow-sm p-3">
                <h5 class="card-title text-primary">Cadastro de Empreendimento</h5>
                <form id="form-empreendimento">
                    <input type="hidden" id="emp-id">
                    
                    <div class="mb-2">
                        <label class="form-label">Nome da Empresa</label>
                        <input type="text" id="nome" class="form-control" required>
                    </div>
                    
                    <div class="mb-2">
                        <label class="form-label">Responsável</label>
                        <input type="text" id="responsavel" class="form-control" required>
                    </div>

                    <div class="mb-2">
                        <label class="form-label">Contato</label>
                        <input type="email" id="contato" class="form-control" required>
                    </div>

                    <div class="mb-2">
                        <label class="form-label">Endereço Completo</label>
                        <input type="text" id="endereco" class="form-control" placeholder="Rua, Nº, Bairro" required>
                    </div>

                    <div class="mb-2">
                        <label class="form-label">Município (SC)</label>
                        <input type="text" id="municipio" class="form-control" required>
                    </div>

                    <div class="row mb-3">
                        <div class="col">
                            <label class="form-label">Segmento</label>
                            <select id="segmento" class="form-select">
                                <option value="Tecnologia">Tecnologia</option>
                                <option value="Comércio">Comércio</option>
                                <option value="Indústria">Indústria</option>
                                <option value="Serviços">Serviços</option>
                                <option value="Agronegócio">Agronegócio</option>
                            </select>
                        </div>
                        <div class="col">
                            <label class="form-label">Status</label>
                            <select id="status" class="form-select">
                                <option value="Ativo">Ativo</option>
                                <option value="Inativo">Inativo</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Salvar Registro</button>
                </form>
            </div>
        </div>

        <div class="col-md-8">
            <div class="mb-3">
                <input type="text" id="busca-empresa" class="form-control" placeholder="🔍 Buscar por nome, código, cidade ou endereço...">
            </div>
            <div class="table-responsive">
                <table class="table table-striped table-hover border">
                    <thead class="table-dark">
                        <tr>
                            <th>Cód.</th>
                            <th>Empresa</th>
                            <th>Localização (Endereço/Cidade)</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="lista-corpo">
                        </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
