name: Kanban — Mover tarefas automaticamente

on:
  issues:
    types: [assigned]
  pull_request:
    types: [opened, closed]

jobs:
  # Quando uma issue é atribuída → mover para "In Progress"
  issue-assigned-to-in-progress:
    name: Issue atribuida → In Progress
    runs-on: ubuntu-latest
    if: github.event_name == 'issues' && github.event.action == 'assigned'

    steps:
      - name: Mover issue para In Progress no projeto
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.payload.issue.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            // Busca o projeto do usuario (project number 7)
            const projectNumber = 7;

            // Busca o ID do projeto via GraphQL
            const projectQuery = await github.graphql(`
              query($owner: String!, $number: Int!) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue { number }
                        }
                      }
                    }
                  }
                }
              }
            `, { owner, number: projectNumber });

            const project = projectQuery.user.projectV2;
            const statusField = project.fields.nodes.find(f => f.name === 'Status');
            const inProgressOption = statusField?.options?.find(o =>
              o.name === 'In Progress' || o.name === 'Em andamento'
            );

            if (!statusField || !inProgressOption) {
              console.log('Campo Status ou opcao In Progress nao encontrado. Verifique o Kanban.');
              return;
            }

            const item = project.items.nodes.find(i => i.content?.number === issueNumber);
            if (!item) {
              console.log(`Issue #${issueNumber} nao encontrada no projeto.`);
              return;
            }

            // Atualiza o status para In Progress
            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item { id }
                }
              }
            `, {
              projectId: project.id,
              itemId: item.id,
              fieldId: statusField.id,
              optionId: inProgressOption.id
            });

            console.log(`Issue #${issueNumber} movida para In Progress.`);

  # Quando um PR é aberto referenciando uma issue → mover para "In Review"
  pr-opened-to-review:
    name: PR aberto → In Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.action == 'opened'

    steps:
      - name: Mover issue para In Review no projeto
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prBody = context.payload.pull_request.body || '';
            const prTitle = context.payload.pull_request.title || '';
            const owner = context.repo.owner;
            const projectNumber = 7;

            // Extrai numeros de issue mencionadas no PR (closes #N, fixes #N, etc.)
            const issueRefs = [...(prBody + ' ' + prTitle).matchAll(/#(\d+)/g)]
              .map(m => parseInt(m[1]));

            if (issueRefs.length === 0) {
              console.log('Nenhuma issue referenciada no PR.');
              return;
            }

            const projectQuery = await github.graphql(`
              query($owner: String!, $number: Int!) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue { number }
                        }
                      }
                    }
                  }
                }
              }
            `, { owner, number: projectNumber });

            const project = projectQuery.user.projectV2;
            const statusField = project.fields.nodes.find(f => f.name === 'Status');
            const reviewOption = statusField?.options?.find(o =>
              o.name === 'In Review' || o.name === 'Review'
            );

            if (!statusField || !reviewOption) {
              console.log('Campo Status ou opcao In Review nao encontrado.');
              return;
            }

            for (const issueNumber of issueRefs) {
              const item = project.items.nodes.find(i => i.content?.number === issueNumber);
              if (!item) continue;

              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) {
                    projectV2Item { id }
                  }
                }
              `, {
                projectId: project.id,
                itemId: item.id,
                fieldId: statusField.id,
                optionId: reviewOption.id
              });

              console.log(`Issue #${issueNumber} movida para In Review.`);
            }

  # Quando PR é mergeado → mover issue para "Done"
  pr-merged-to-done:
    name: PR mergeado → Done
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true

    steps:
      - name: Mover issue para Done no projeto
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prBody = context.payload.pull_request.body || '';
            const prTitle = context.payload.pull_request.title || '';
            const owner = context.repo.owner;
            const projectNumber = 7;

            const issueRefs = [...(prBody + ' ' + prTitle).matchAll(/#(\d+)/g)]
              .map(m => parseInt(m[1]));

            if (issueRefs.length === 0) return;

            const projectQuery = await github.graphql(`
              query($owner: String!, $number: Int!) {
                user(login: $owner) {
                  projectV2(number: $number) {
                    id
                    fields(first: 20) {
                      nodes {
                        ... on ProjectV2SingleSelectField {
                          id
                          name
                          options { id name }
                        }
                      }
                    }
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue { number }
                        }
                      }
                    }
                  }
                }
              }
            `, { owner, number: projectNumber });

            const project = projectQuery.user.projectV2;
            const statusField = project.fields.nodes.find(f => f.name === 'Status');
            const doneOption = statusField?.options?.find(o =>
              o.name === 'Done' || o.name === 'Concluido'
            );

            if (!statusField || !doneOption) return;

            for (const issueNumber of issueRefs) {
              const item = project.items.nodes.find(i => i.content?.number === issueNumber);
              if (!item) continue;

              await github.graphql(`
                mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: $projectId
                    itemId: $itemId
                    fieldId: $fieldId
                    value: { singleSelectOptionId: $optionId }
                  }) {
                    projectV2Item { id }
                  }
                }
              `, {
                projectId: project.id,
                itemId: item.id,
                fieldId: statusField.id,
                optionId: doneOption.id
              });

              console.log(`Issue #${issueNumber} movida para Done.`);
            }
