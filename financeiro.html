<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Financeiro — SCTEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./src/css/styles.css" />
    <script>
      (function () {
        try {
          var cfg = JSON.parse(localStorage.getItem("SCTEC_CONFIG") || "{}");
          var cores = cfg.cores || {};
          var r = document.documentElement;
          if (cores.header) r.style.setProperty("--sc-header", cores.header);
          if (cores.btn) r.style.setProperty("--sc-btn", cores.btn);
          if (cores.destaque) r.style.setProperty("--sc-header2", cores.destaque);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-light">
    <div id="app-navbar"></div>
    <main class="container pb-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 id="rotinaTitle">💰 Controle Financeiro</h1>
        <button class="btn btn-success" id="btn-nova-transacao">+ Nova Transação</button>
      </div>

      <!-- CARDS DE RESUMO -->
      <div class="row g-3 mb-4">
        <div class="col-md-4">
          <div class="card border-0 shadow-sm text-white bg-success">
            <div class="card-body d-flex justify-content-between align-items-center">
              <div>
                <div class="small">Total Entradas</div>
                <h4 class="mb-0 fw-bold" id="resumo-entradas">R$ 0,00</h4>
              </div>
              <span style="font-size:2rem;">⬆️</span>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card border-0 shadow-sm text-white bg-danger">
            <div class="card-body d-flex justify-content-between align-items-center">
              <div>
                <div class="small">Total Saídas</div>
                <h4 class="mb-0 fw-bold" id="resumo-saidas">R$ 0,00</h4>
              </div>
              <span style="font-size:2rem;">⬇️</span>
            </div>
          </div>
        </div>
        <div class="col-md-4">
          <div class="card border-0 shadow-sm text-white" id="card-saldo">
            <div class="card-body d-flex justify-content-between align-items-center">
              <div>
                <div class="small">Saldo</div>
                <h4 class="mb-0 fw-bold" id="resumo-saldo">R$ 0,00</h4>
              </div>
              <span style="font-size:2rem;">💼</span>
            </div>
          </div>
        </div>
      </div>

      <!-- FILTROS -->
      <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-3">
          <div class="row g-2">
            <div class="col-md-3">
              <input type="month" id="filtro-mes" class="form-control" />
            </div>
            <div class="col-md-3">
              <select id="filtro-tipo" class="form-select">
                <option value="">Entrada e Saída</option>
                <option value="entrada">Entradas</option>
                <option value="saida">Saídas</option>
              </select>
            </div>
            <div class="col-md-4">
              <input type="text" id="filtro-busca" class="form-control" placeholder="Buscar por descrição..." />
            </div>
            <div class="col-md-2">
              <button class="btn btn-outline-secondary w-100" id="btn-limpar">🔄</button>
            </div>
          </div>
        </div>
      </div>

      <!-- TABELA -->
      <div class="card shadow-sm border-0">
        <div class="table-responsive">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th>Data</th>
                <th>Descrição</th>
                <th>Categoria</th>
                <th>Empresa</th>
                <th class="text-end">Valor</th>
                <th class="text-center">Ações</th>
              </tr>
            </thead>
            <tbody id="financeiro-lista"></tbody>
          </table>
        </div>
      </div>

      <div id="financeiro-vazio" class="text-center py-5 d-none">
        <div style="font-size:3rem;">💰</div>
        <h5 class="mt-3 text-muted">Nenhuma transação encontrada</h5>
      </div>
    </main>

    <!-- MODAL -->
    <div class="modal fade" id="modal-transacao" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header text-white">
            <h5 class="modal-title" id="titulo-modal-transacao">💰 Nova Transação</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body p-4">
            <form id="form-transacao">
              <div class="mb-3">
                <label class="form-label fw-bold">Tipo *</label>
                <div class="d-flex gap-3">
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="trans-tipo" id="tipo-entrada" value="entrada" checked />
                    <label class="form-check-label text-success fw-bold" for="tipo-entrada">⬆️ Entrada</label>
                  </div>
                  <div class="form-check">
                    <input class="form-check-input" type="radio" name="trans-tipo" id="tipo-saida" value="saida" />
                    <label class="form-check-label text-danger fw-bold" for="tipo-saida">⬇️ Saída</label>
                  </div>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Descrição *</label>
                <input type="text" id="trans-descricao" class="form-control" required />
              </div>
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label fw-bold">Valor (R$) *</label>
                  <input type="number" id="trans-valor" class="form-control" min="0.01" step="0.01" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-bold">Data *</label>
                  <input type="date" id="trans-data" class="form-control" required />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Categoria</label>
                <select id="trans-categoria" class="form-select">
                  <option value="servicos">Serviços</option>
                  <option value="produtos">Produtos</option>
                  <option value="salarios">Salários</option>
                  <option value="impostos">Impostos</option>
                  <option value="aluguel">Aluguel</option>
                  <option value="marketing">Marketing</option>
                  <option value="outros">Outros</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Empresa</label>
                <select id="trans-empresa" class="form-select">
                  <option value="">— Nenhuma —</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Observações</label>
                <textarea id="trans-obs" class="form-control" rows="2"></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" form="form-transacao" class="btn btn-success">Salvar</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./src/js/core/config.js"></script>
    <script src="./src/js/core/auth.js"></script>
    <script src="./src/js/core/storage.js"></script>
    <script src="./src/js/core/modules.js"></script>
    <script src="./src/js/core/theme.js"></script>
    <script src="./src/js/core/navbar.js"></script>
    <script src="./src/js/modules/financeiro.js"></script>
    <script src="./src/js/core/inactivity.js"></script>
  </body>
</html>
