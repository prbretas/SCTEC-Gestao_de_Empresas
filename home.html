<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home — SCTEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
    <link rel="stylesheet" href="./css/home.css" />
    <script>
      (function () {
        try {
          var cfg = JSON.parse(localStorage.getItem("SCTEC_CONFIG") || "{}");
          var cores = cfg.cores || {};
          var r = document.documentElement;
          if (cores.header) r.style.setProperty("--sc-header", cores.header);
          if (cores.btn) r.style.setProperty("--sc-btn", cores.btn);
          if (cores.destaque) r.style.setProperty("--sc-header2", cores.destaque);
        } catch (e) {}
      })();
    </script>
  </head>

  <body class="bg-light d-flex flex-column min-vh-100">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark shadow-sm mb-0">
      <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand h1 mb-0" id="navbar-brand-home">🏭 SCTEC - Gestão Empresarial</span>
        <div class="d-flex align-items-center gap-3">
          <div class="form-check form-switch text-light mb-0">
            <input class="form-check-input" type="checkbox" id="dark-mode-switch" />
            <label class="form-check-label small">Modo Escuro</label>
          </div>
          <button class="btn btn-outline-light btn-sm" id="btn-logout" title="Sair">🚪 Sair</button>
        </div>
      </div>
    </nav>

    <!-- CONTEÚDO -->
    <main class="flex-grow-1 d-flex flex-column justify-content-center py-5">
      <div class="container" style="max-width: 820px;">

        <!-- Saudação -->
        <div class="mb-5 text-center">
          <p class="home-greeting mb-1">Bem-vindo de volta,</p>
          <h2 class="fw-bold mb-2" id="home-nome-usuario">—</h2>
          <span class="user-badge" id="home-id-usuario">#00000</span>
          <span id="home-role-badge" class="badge bg-secondary ms-2"></span>
          <br>
          <small id="home-codigo-convite" class="text-muted mt-2 fw-bold" style="display:none;font-size:.75rem;letter-spacing:.5px;"></small>
        </div>

        <!-- Cards de Navegação — renderizados dinamicamente por modules.js -->
        <div class="row g-4 justify-content-center" id="cards-grid"></div>

        <!-- Linha Admin — cards exclusivos do Admin -->
        <div class="row g-4 justify-content-center mt-2" id="cards-grid-admin" style="display:none!important;"></div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/modules.js"></script>
    <script src="./js/home.js"></script>
    <script src="./js/inactivity.js"></script>
  </body>
</html>
