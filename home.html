<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home — SCTEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
    <script>
      (function () {
        try {
          var cfg = JSON.parse(localStorage.getItem("SCTEC_CONFIG") || "{}");
          var cores = cfg.cores || {};
          var r = document.documentElement;
          if (cores.header) r.style.setProperty("--sc-header", cores.header);
          if (cores.btn) r.style.setProperty("--sc-btn", cores.btn);
          if (cores.destaque) r.style.setProperty("--sc-header2", cores.destaque);
        } catch (e) {}
      })();
    </script>
    <style>
      .home-card {
        border: none;
        border-radius: 16px;
        cursor: pointer;
        transition: transform 0.15s, box-shadow 0.15s;
        text-decoration: none;
        color: inherit;
        display: block;
      }
      .home-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12) !important;
        color: inherit;
      }
      .home-card .card-icon {
        font-size: 3rem;
        line-height: 1;
      }
      .home-card .card-body {
        padding: 2rem 1.5rem;
      }
      body.dark-mode .home-card {
        background-color: #1e1e1e !important;
        color: #e0e0e0 !important;
      }
      body.dark-mode .home-card:hover {
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.4) !important;
      }
      .home-greeting {
        font-size: 1.1rem;
        color: #6c757d;
      }
      body.dark-mode .home-greeting {
        color: #adb5bd;
      }
      .user-badge {
        background-color: var(--sc-btn, #006ebc);
        color: #fff;
        font-size: 0.75rem;
        padding: 3px 10px;
        border-radius: 20px;
        font-weight: 600;
      }
    </style>
  </head>

  <body class="bg-light d-flex flex-column min-vh-100">

    <!-- NAVBAR -->
    <nav class="navbar navbar-dark shadow-sm mb-0">
      <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand h1 mb-0" id="navbar-brand-home">🏭 SCTEC - Gestão Empresarial</span>
        <div class="d-flex align-items-center gap-3">
          <div class="form-check form-switch text-light mb-0">
            <input class="form-check-input" type="checkbox" id="dark-mode-switch" />
            <label class="form-check-label small">Modo Escuro</label>
          </div>
          <button class="btn btn-outline-light btn-sm" id="btn-logout" title="Sair">🚪 Sair</button>
        </div>
      </div>
    </nav>

    <!-- CONTEÚDO -->
    <main class="flex-grow-1 d-flex flex-column justify-content-center py-5">
      <div class="container" style="max-width: 820px;">

        <!-- Saudação -->
        <div class="mb-5 text-center">
          <p class="home-greeting mb-1">Bem-vindo de volta,</p>
          <h2 class="fw-bold mb-2" id="home-nome-usuario">—</h2>
          <span class="user-badge" id="home-id-usuario">#00000</span>
        </div>

        <!-- Cards de Navegação -->
        <div class="row g-4 justify-content-center">

          <div class="col-md-4">
            <a href="index.html" class="home-card card shadow-sm text-center">
              <div class="card-body">
                <div class="card-icon mb-3">📋</div>
                <h5 class="fw-bold mb-1">Cadastros</h5>
                <p class="text-muted small mb-0">Gerencie empresas e empreendimentos</p>
              </div>
            </a>
          </div>

          <div class="col-md-4">
            <a href="dashboard.html" class="home-card card shadow-sm text-center">
              <div class="card-body">
                <div class="card-icon mb-3">📊</div>
                <h5 class="fw-bold mb-1">Dashboard</h5>
                <p class="text-muted small mb-0">Visualize métricas e gráficos analíticos</p>
              </div>
            </a>
          </div>

          <div class="col-md-4">
            <a href="settings.html" class="home-card card shadow-sm text-center">
              <div class="card-body">
                <div class="card-icon mb-3">⚙️</div>
                <h5 class="fw-bold mb-1">Configurações</h5>
                <p class="text-muted small mb-0">Personalize cores, logo e segmentos</p>
              </div>
            </a>
          </div>

        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", () => {
        // Guard de rota
        const sessao = AuthService.requireAuth();
        if (!sessao) return;

        // Aplica config visual
        if (window.ConfigController) ConfigController.aplicar(ConfigController.obter());

        // Preenche saudação
        document.getElementById("home-nome-usuario").textContent = sessao.nome;
        document.getElementById("home-id-usuario").textContent = `#${sessao.id}`;

        // Dark mode
        const switchBtn = document.getElementById("dark-mode-switch");
        const aplicarDark = (dark) => {
          document.body.classList.toggle("dark-mode", dark);
          localStorage.setItem("SCTEC_THEME", dark ? "dark" : "light");
          if (switchBtn) switchBtn.checked = dark;
        };
        aplicarDark(localStorage.getItem("SCTEC_THEME") === "dark");
        switchBtn?.addEventListener("change", (e) => aplicarDark(e.target.checked));

        // Logout
        document.getElementById("btn-logout").addEventListener("click", () => {
          if (confirm("Deseja sair do sistema?")) {
            AuthService.logout();
          }
        });
      });
    </script>
  </body>
</html>
