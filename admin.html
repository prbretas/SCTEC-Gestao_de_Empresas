<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gerenciar Usuários — SCTEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
    <script>
      (function () {
        try {
          var cfg = JSON.parse(localStorage.getItem("SCTEC_CONFIG") || "{}");
          var cores = cfg.cores || {};
          var r = document.documentElement;
          if (cores.header) r.style.setProperty("--sc-header", cores.header);
          if (cores.btn) r.style.setProperty("--sc-btn", cores.btn);
          if (cores.destaque) r.style.setProperty("--sc-header2", cores.destaque);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-light">

    <nav class="navbar navbar-dark shadow-sm mb-4">
      <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand h1 mb-0">🏭 SCTEC — Gerenciar Usuários</span>
        <div class="d-flex align-items-center gap-2">
          <span class="text-white small" id="admin-identidade"></span>
          <a href="home.html" class="btn btn-outline-light btn-sm">← Home</a>
        </div>
      </div>
    </nav>

    <main class="container pb-5">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h1 id="rotinaTitle">👑 Painel do Administrador</h1>
        <div>
          <span class="badge bg-secondary me-2" id="admin-org-nome"></span>
          <button class="btn btn-outline-primary btn-sm" id="btn-copiar-convite" title="Copiar código de convite">
            📋 Código de Convite
          </button>
        </div>
      </div>

      <!-- CARD CÓDIGO DE CONVITE -->
      <div class="alert alert-info d-flex align-items-center gap-3 mb-4" id="card-convite">
        <div>
          <strong>Código de Convite da Organização:</strong>
          <span id="codigo-convite-display" class="ms-2 fw-bold font-monospace fs-5"></span>
        </div>
        <button class="btn btn-sm btn-outline-primary ms-auto" id="btn-copiar-codigo">📋 Copiar</button>
      </div>

      <!-- TABELA DE USUÁRIOS -->
      <div class="card shadow-sm border-0">
        <div class="card-body p-0">
          <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
              <tr>
                <th>Usuário</th>
                <th>Perfil</th>
                <th>Cadastrado em</th>
                <th>Status</th>
                <th class="text-center">Ações</th>
              </tr>
            </thead>
            <tbody id="admin-usuarios-lista"></tbody>
          </table>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/admin.js"></script>
    <script src="./js/inactivity.js"></script>
  </body>
</html>
