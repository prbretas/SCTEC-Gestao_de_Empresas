<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Agenda — SCTEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
    <script>
      (function () {
        try {
          var cfg = JSON.parse(localStorage.getItem("SCTEC_CONFIG") || "{}");
          var cores = cfg.cores || {};
          var r = document.documentElement;
          if (cores.header) r.style.setProperty("--sc-header", cores.header);
          if (cores.btn) r.style.setProperty("--sc-btn", cores.btn);
          if (cores.destaque) r.style.setProperty("--sc-header2", cores.destaque);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-light">

    <div id="app-navbar"></div>

    <main class="container pb-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 id="rotinaTitle">📅 Agenda de Compromissos</h1>
        <button class="btn btn-success" id="btn-novo-compromisso">+ Novo Compromisso</button>
      </div>

      <!-- FILTROS -->
      <div class="card shadow-sm border-0 mb-4">
        <div class="card-body p-3">
          <div class="row g-2 align-items-center">
            <div class="col-md-3">
              <input type="month" id="filtro-mes" class="form-control" />
            </div>
            <div class="col-md-3">
              <select id="filtro-tipo" class="form-select">
                <option value="">Todos os tipos</option>
                <option value="reuniao">Reunião</option>
                <option value="visita">Visita</option>
                <option value="ligacao">Ligação</option>
                <option value="prazo">Prazo</option>
                <option value="outro">Outro</option>
              </select>
            </div>
            <div class="col-md-4">
              <input type="text" id="filtro-busca" class="form-control" placeholder="Buscar por título ou empresa..." />
            </div>
            <div class="col-md-2">
              <button class="btn btn-outline-secondary w-100" id="btn-limpar-filtro">🔄 Limpar</button>
            </div>
          </div>
        </div>
      </div>

      <!-- LISTA DE COMPROMISSOS -->
      <div id="agenda-lista"></div>

      <!-- ESTADO VAZIO -->
      <div id="agenda-vazio" class="text-center py-5 d-none">
        <div style="font-size:3rem;">📅</div>
        <h5 class="mt-3 text-muted">Nenhum compromisso encontrado</h5>
        <p class="text-muted small">Clique em "+ Novo Compromisso" para adicionar.</p>
      </div>
    </main>

    <!-- MODAL: Novo/Editar Compromisso -->
    <div class="modal fade" id="modal-compromisso" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header text-white">
            <h5 class="modal-title" id="titulo-modal-compromisso">📅 Novo Compromisso</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body p-4">
            <form id="form-compromisso">
              <div class="mb-3">
                <label class="form-label fw-bold">Título *</label>
                <input type="text" id="comp-titulo" class="form-control" required />
              </div>
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label fw-bold">Data *</label>
                  <input type="date" id="comp-data" class="form-control" required />
                </div>
                <div class="col-md-6">
                  <label class="form-label fw-bold">Horário</label>
                  <input type="time" id="comp-hora" class="form-control" />
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Tipo</label>
                <select id="comp-tipo" class="form-select">
                  <option value="reuniao">🤝 Reunião</option>
                  <option value="visita">🏢 Visita</option>
                  <option value="ligacao">📞 Ligação</option>
                  <option value="prazo">⏰ Prazo</option>
                  <option value="outro">📌 Outro</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Empresa Relacionada</label>
                <select id="comp-empresa" class="form-select">
                  <option value="">— Nenhuma —</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Descrição</label>
                <textarea id="comp-descricao" class="form-control" rows="3"></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label fw-bold">Status</label>
                <select id="comp-status" class="form-select">
                  <option value="pendente">⏳ Pendente</option>
                  <option value="concluido">✅ Concluído</option>
                  <option value="cancelado">❌ Cancelado</option>
                </select>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="submit" form="form-compromisso" class="btn btn-success">Salvar</button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/modules.js"></script>
    <script src="./js/theme.js"></script>
    <script src="./js/navbar.js"></script>
    <script src="./js/agenda.js"></script>
    <script src="./js/inactivity.js"></script>
  </body>
</html>
