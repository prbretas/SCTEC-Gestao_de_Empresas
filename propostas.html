<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Propostas — SCTEC</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="./css/styles.css" />
    <script>
      (function () {
        try {
          var cfg = JSON.parse(localStorage.getItem("SCTEC_CONFIG") || "{}");
          var cores = cfg.cores || {};
          var r = document.documentElement;
          if (cores.header) r.style.setProperty("--sc-header", cores.header);
          if (cores.btn) r.style.setProperty("--sc-btn", cores.btn);
          if (cores.destaque) r.style.setProperty("--sc-header2", cores.destaque);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark shadow-sm mb-4">
      <div class="container d-flex justify-content-between align-items-center">
        <span class="navbar-brand h1 mb-0">🏭 SCTEC</span>
        <a href="home.html" class="btn btn-outline-light btn-sm">🏠 Home</a>
      </div>
    </nav>

    <main class="container pb-5">
      <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 id="rotinaTitle">📄 Propostas e Orçamentos</h1>
        <button class="btn btn-success" id="btn-nova-proposta">+ Nova Proposta</button>
      </div>

      <!-- LISTA -->
      <div id="propostas-lista" class="row g-3"></div>

      <div id="propostas-vazio" class="text-center py-5 d-none">
        <div style="font-size:3rem;">📄</div>
        <h5 class="mt-3 text-muted">Nenhuma proposta criada</h5>
      </div>
    </main>

    <!-- MODAL: Criar/Editar Proposta -->
    <div class="modal fade" id="modal-proposta" tabindex="-1">
      <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg">
          <div class="modal-header text-white">
            <h5 class="modal-title" id="titulo-modal-proposta">📄 Nova Proposta</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body p-4">
            <form id="form-proposta">
              <div class="row g-3 mb-3">
                <div class="col-md-8">
                  <label class="form-label fw-bold">Título *</label>
                  <input type="text" id="prop-titulo" class="form-control" required placeholder="Ex: Proposta de Desenvolvimento Web" />
                </div>
                <div class="col-md-4">
                  <label class="form-label fw-bold">Número</label>
                  <input type="text" id="prop-numero" class="form-control" placeholder="Ex: 2026-001" />
                </div>
              </div>
              <div class="row g-3 mb-3">
                <div class="col-md-6">
                  <label class="form-label fw-bold">Empresa *</label>
                  <select id="prop-empresa" class="form-select" required>
                    <option value="">Selecione...</option>
                  </select>
                </div>
                <div class="col-md-3">
                  <label class="form-label fw-bold">Validade</label>
                  <input type="date" id="prop-validade" class="form-control" />
                </div>
                <div class="col-md-3">
                  <label class="form-label fw-bold">Status</label>
                  <select id="prop-status" class="form-select">
                    <option value="rascunho">📝 Rascunho</option>
                    <option value="enviada">📤 Enviada</option>
                    <option value="aceita">✅ Aceita</option>
                    <option value="recusada">❌ Recusada</option>
                  </select>
                </div>
              </div>

              <!-- ITENS DA PROPOSTA -->
              <h6 class="fw-bold mt-2 mb-2">📦 Itens</h6>
              <div id="prop-itens-lista"></div>
              <button type="button" class="btn btn-outline-secondary btn-sm mt-2" id="btn-add-item">+ Adicionar Item</button>

              <div class="row g-3 mt-3">
                <div class="col-md-4 ms-auto">
                  <div class="d-flex justify-content-between fw-bold border-top pt-2">
                    <span>Total:</span>
                    <span id="prop-total-display" class="text-success">R$ 0,00</span>
                  </div>
                </div>
              </div>

              <div class="mb-3 mt-3">
                <label class="form-label fw-bold">Observações / Condições</label>
                <textarea id="prop-obs" class="form-control" rows="3" placeholder="Condições de pagamento, prazo de entrega, etc."></textarea>
              </div>
            </form>
          </div>
          <div class="modal-footer d-flex justify-content-between">
            <button type="button" class="btn btn-outline-secondary" id="btn-imprimir-proposta">🖨️ Imprimir / PDF</button>
            <div>
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" form="form-proposta" class="btn btn-success">Salvar</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/config.js"></script>
    <script src="./js/auth.js"></script>
    <script src="./js/storage.js"></script>
    <script src="./js/propostas.js"></script>
    <script src="./js/inactivity.js"></script>
  </body>
</html>
